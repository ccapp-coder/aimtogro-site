    :root {

    html, body { height: 100%; }
    body {

      margin: 0;

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;

      animation: glow 8s ease-in-out infinite alternate;

      pointer-events: none;
      animation: glow 11s ease-in-out infinite alternate-reverse;
    }
    @keyframes glow {
      0% { transform: scale(1) translateX(0); opacity: 0.7; }
      100% { transform: scale(1.1) translateX(40px); opacity: 1; }

      animation: fadeUp 0.7s ease-out 0.1s forwards;

      line-height: 1;
